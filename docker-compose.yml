services:
  postgres:
    image: postgres:18
    command: ['postgres', '-c', 'wal_level=logical']
    environment:
      POSTGRES_DB: penge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d penge']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
